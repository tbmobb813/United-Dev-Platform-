name: CI

on:
  pull_request:
    branches: [main, feat/*]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Enable Corepack and prepare pnpm (pinned)
        run: |
          corepack enable
          # Pin to the repo's packageManager / pnpm version to ensure reproducible CI
          corepack prepare pnpm@9.0.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Debug Prettier and package.json state
        run: |
          echo "=== Prettier version and location ==="
          pnpm exec -- prettier --version
          pnpm exec -- which prettier
          echo ""
          echo "=== Git status (checking for modified files) ==="
          git status --porcelain
          echo ""
          echo "=== Diff of package.json (if modified) ==="
          git --no-pager diff -- package.json || echo "No changes to package.json"
          echo ""
          echo "=== Last 10 bytes of package.json in hex ==="
          tail -c 10 package.json | od -An -tx1

      - name: Validate environment (main only)
        if: github.ref == 'refs/heads/main'
        run: pnpm ci:validate-env

      - name: Check Prettier formatting
        run: pnpm format:check

      - name: Run ESLint
        run: pnpm lint

      - name: Run TypeScript type check
        run: pnpm type-check

      - name: Run tests
        run: pnpm test:core

      - name: Build web
        run: pnpm --filter @udp/web build
