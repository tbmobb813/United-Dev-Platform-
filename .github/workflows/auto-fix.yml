name: Auto Fix (ESLint + Prettier)

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 3 * * 0"
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'github-actions[bot]' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Enable Corepack & pnpm (pinned)
        run: |
          corepack enable
          corepack prepare pnpm@9.0.0 --activate

      - name: Enable Corepack & pnpm (early)
        run: |
          corepack enable
          # Use latest pnpm for speed/bugfixes during setup, then pin for reproducibility
          corepack prepare pnpm@latest --activate

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Enable Corepack & pnpm (pinned)
        run: |
          corepack enable
          # Pin to the repo's packageManager / pnpm version to ensure reproducible CI
          corepack prepare pnpm@9.0.0 --activate

      - name: Detect changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then echo "changed=true" >> $GITHUB_OUTPUT; else echo "changed=false" >> $GITHUB_OUTPUT; fi

      - name: Create branch for fixes
        id: newbranch
        if: steps.changes.outputs.changed == 'true'
        run: |
          BRANCH="auto-fix/eslint-prettier-$(date +%s)"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Configure git remote for authenticated push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

      - name: Discard workflow file changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          # Ensure no changes under .github/workflows are staged or present in the working tree
          if [ -n "$(git status --porcelain .github/workflows || true)" ]; then
            echo "Reverting changes under .github/workflows to avoid workflows permission issues"
            git restore --staged .github/workflows || true
            git checkout -- .github/workflows || true
          fi

      - name: Re-evaluate changes after discard
        id: changes2
        if: steps.changes.outputs.changed == 'true'
        run: |
          if [ -n "$(git status --porcelain)" ]; then echo "changed=true" >> $GITHUB_OUTPUT; else echo "changed=false" >> $GITHUB_OUTPUT; fi

      - name: Commit fixes
        if: steps.changes2.outputs.changed == 'true'
        uses: EndBug/add-and-commit@v9
        with:
          message: "chore: apply ESLint/Prettier auto-fixes"
          # Exclude workflow files to avoid permission issues when GITHUB_TOKEN
          # doesn't have `workflows:write`, and to prevent auto-formatting CI configs.
          # Uses git's pathspec exclusion syntax.
          add: ". ':(exclude).github/workflows/**'"
          author_name: "github-actions[bot]"
          author_email: "github-actions[bot]@users.noreply.github.com"
          push: false

      - name: Push fixes branch (set upstream)
        if: steps.changes2.outputs.changed == 'true'
        run: |
          git push --set-upstream origin "${{ steps.newbranch.outputs.branch }}"

      - name: Create Pull Request with fixes
        if: steps.changes2.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.newbranch.outputs.branch }}
          commit-message: "chore: apply ESLint/Prettier auto-fixes"
          title: "chore: auto-fix lint & format"
          body: |
            This PR contains auto-applied ESLint and Prettier fixes produced by the `auto-fix` workflow.

            The workflow runs `pnpm lint:fix` and `pnpm format`, commits any changes to a new branch, and opens this PR.
          labels: auto-fix
          base: main

      - name: No changes
        if: steps.changes.outputs.changed == 'false'
        run: echo "No auto-fix changes detected; nothing to commit."
