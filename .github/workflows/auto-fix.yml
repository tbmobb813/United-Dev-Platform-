name: Auto Fix (ESLint + Prettier)

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 3 * * 0"
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  name: auto-fix-disabled

  # Minimal disabled placeholder for local runs; the full auto-fix workflow
  # is enabled in the remote repository. Keeping a local no-op avoids accidental
  # workflow updates while running CI locally.
  on: [workflow_dispatch]

  jobs:
    noop:
      runs-on: ubuntu-latest
      steps:
        - name: no-op
          run: echo "auto-fix workflow disabled for local testing"
        if: steps.changes.outputs.changed == 'true'
        run: |
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

      - name: Discard workflow file changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          # Ensure no changes under .github/workflows are staged or present in the working tree
          if [ -n "$(git status --porcelain .github/workflows || true)" ]; then
            echo "Reverting changes under .github/workflows to avoid workflows permission issues"
            git restore --staged .github/workflows || true
            git checkout -- .github/workflows || true
          fi

      - name: Re-evaluate changes after discard
        id: changes2
        if: steps.changes.outputs.changed == 'true'
        run: |
          if [ -n "$(git status --porcelain)" ]; then echo "changed=true" >> $GITHUB_OUTPUT; else echo "changed=false" >> $GITHUB_OUTPUT; fi

      - name: Commit fixes
        if: steps.changes2.outputs.changed == 'true'
        uses: EndBug/add-and-commit@v9
